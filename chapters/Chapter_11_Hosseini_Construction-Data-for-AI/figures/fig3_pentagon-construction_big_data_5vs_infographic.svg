<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" width="100%" height="100%">
  <defs>
    <!-- Keep Google Font import for high-quality web/browser rendering -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&amp;family=Lora:ital,wght@0,400;0,500;1,400&amp;display=swap');
    </style>
  </defs>

  <!-- Canvas Background - Inline styled for robust Word support -->
  <rect width="1200" height="1000" fill="#FFFFFF" />

  <!-- ==================== PENTAGONAL BASE GRAPHICS ==================== -->
  <!-- Solid Outer Pentagon Background -->
  <polygon points="600,275 814,430 732,682 468,682 386,430" fill="#FBF9F6" stroke="#D0CDBB" stroke-width="2.5" />

  <!-- ==================== CENTRAL HUB ==================== -->
  <!-- Clean central text directly on background -->
  <text x="600" y="492" font-family="'Playfair Display', 'Lora', Georgia, 'Times New Roman', serif" font-size="28" fill="#2D2B29" text-anchor="middle" font-weight="600">Construction</text>
  <text x="600" y="528" font-family="'Playfair Display', 'Lora', Georgia, 'Times New Roman', serif" font-size="28" fill="#2D2B29" text-anchor="middle" font-weight="600">Data</text>

  <!-- ==================== NODE 01: VOLUME ==================== -->
  <!-- Background White Halo Mask to block the underlying pentagon vertex line -->
  <text x="600" y="284" font-family="'Playfair Display', 'Lora', Georgia, 'Times New Roman', serif" font-size="25" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="12" stroke-linejoin="round" text-anchor="middle" font-weight="600">Volume</text>
  <!-- Foreground Crisp Text -->
  <text x="600" y="284" font-family="'Playfair Display', 'Lora', Georgia, 'Times New Roman', serif" font-size="25" fill="#C25B42" text-anchor="middle" font-weight="600">Volume</text>
  
  <!-- Explanation 01 (Above Pentagon - Brought closer from y=115 to y=170) -->
  <text x="600" y="170" font-family="'Lora', Georgia, 'Times New Roman', serif" font-size="16" fill="#111111" text-anchor="middle">Immensely data-intensive —</text>
  <text x="600" y="194" font-family="'Lora', Georgia, 'Times New Roman', serif" font-size="16" fill="#111111" text-anchor="middle">reality capture, LiDAR and</text>
  <text x="600" y="218" font-family="'Lora', Georgia, 'Times New Roman', serif" font-size="16" fill="#111111" text-anchor="middle">rich BIM environments.</text>

  <!-- ==================== NODE 02: VELOCITY ==================== -->
  <!-- Background White Halo Mask to block the underlying pentagon vertex line -->
  <text x="814" y="439" font-family="'Playfair Display', 'Lora', Georgia, 'Times New Roman', serif" font-size="25" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="12" stroke-linejoin="round" text-anchor="middle" font-weight="600">Velocity</text>
  <!-- Foreground Crisp Text -->
  <text x="814" y="439" font-family="'Playfair Display', 'Lora', Georgia, 'Times New Roman', serif" font-size="25" fill="#B48421" text-anchor="middle" font-weight="600">Velocity</text>
  
  <!-- Explanation 02 (Right of Pentagon - Brought closer from x=920 to x=880) -->
  <text x="880" y="406" font-family="'Lora', Georgia, 'Times New Roman', serif" font-size="16" fill="#111111" text-anchor="start">From monthly batch reports</text>
  <text x="880" y="430" font-family="'Lora', Georgia, 'Times New Roman', serif" font-size="16" fill="#111111" text-anchor="start">to continuous, real-time</text>
  <text x="880" y="454" font-family="'Lora', Georgia, 'Times New Roman', serif" font-size="16" fill="#111111" text-anchor="start">IoT sensor streams.</text>

  <!-- ==================== NODE 03: VARIETY ==================== -->
  <!-- Background White Halo Mask to block the underlying pentagon vertex line -->
  <text x="732" y="691" font-family="'Playfair Display', 'Lora', Georgia, 'Times New Roman', serif" font-size="25" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="12" stroke-linejoin="round" text-anchor="middle" font-weight="600">Variety</text>
  <!-- Foreground Crisp Text -->
  <text x="732" y="691" font-family="'Playfair Display', 'Lora', Georgia, 'Times New Roman', serif" font-size="25" fill="#1E7F58" text-anchor="middle" font-weight="600">Variety</text>
  
  <!-- Explanation 03 (Below-Right of Pentagon - Brought closer from x=830 to x=795) -->
  <text x="795" y="745" font-family="'Lora', Georgia, 'Times New Roman', serif" font-size="16" fill="#111111" text-anchor="start">Fragmented across disciplines,</text>
  <text x="795" y="769" font-family="'Lora', Georgia, 'Times New Roman', serif" font-size="16" fill="#111111" text-anchor="start">formats, platforms and</text>
  <text x="795" y="793" font-family="'Lora', Georgia, 'Times New Roman', serif" font-size="16" fill="#111111" text-anchor="start">diverse stakeholders.</text>

  <!-- ==================== NODE 04: VERACITY ==================== -->
  <!-- Background White Halo Mask to block the underlying pentagon vertex line -->
  <text x="468" y="691" font-family="'Playfair Display', 'Lora', Georgia, 'Times New Roman', serif" font-size="25" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="12" stroke-linejoin="round" text-anchor="middle" font-weight="600">Veracity</text>
  <!-- Foreground Crisp Text -->
  <text x="468" y="691" font-family="'Playfair Display', 'Lora', Georgia, 'Times New Roman', serif" font-size="25" fill="#1C72B1" text-anchor="middle" font-weight="600">Veracity</text>
  
  <!-- Explanation 04 (Below-Left of Pentagon - Brought closer from x=370 to x=405) -->
  <text x="405" y="745" font-family="'Lora', Georgia, 'Times New Roman', serif" font-size="16" fill="#111111" text-anchor="end">Trustworthiness varies;</text>
  <text x="405" y="769" font-family="'Lora', Georgia, 'Times New Roman', serif" font-size="16" fill="#111111" text-anchor="end">structure persists while</text>
  <text x="405" y="793" font-family="'Lora', Georgia, 'Times New Roman', serif" font-size="16" fill="#111111" text-anchor="end">accuracy and quality fail.</text>

  <!-- ==================== NODE 05: VALUE ==================== -->
  <!-- Background White Halo Mask to block the underlying pentagon vertex line -->
  <text x="386" y="439" font-family="'Playfair Display', 'Lora', Georgia, 'Times New Roman', serif" font-size="25" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="12" stroke-linejoin="round" text-anchor="middle" font-weight="600">Value</text>
  <!-- Foreground Crisp Text -->
  <text x="386" y="439" font-family="'Playfair Display', 'Lora', Georgia, 'Times New Roman', serif" font-size="25" fill="#6E508A" text-anchor="middle" font-weight="600">Value</text>
  
  <!-- Explanation 05 (Left of Pentagon - Brought closer from x=280 to x=320) -->
  <text x="320" y="406" font-family="'Lora', Georgia, 'Times New Roman', serif" font-size="16" fill="#111111" text-anchor="end">Latent benefit, largely</text>
  <text x="320" y="430" font-family="'Lora', Georgia, 'Times New Roman', serif" font-size="16" fill="#111111" text-anchor="end">unrealised without deliberate</text>
  <text x="320" y="454" font-family="'Lora', Georgia, 'Times New Roman', serif" font-size="16" fill="#111111" text-anchor="end">data governance.</text>
</svg>