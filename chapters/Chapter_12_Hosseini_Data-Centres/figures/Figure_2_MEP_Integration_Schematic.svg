<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <title>Why Data Centres Require Integrated Systems Thinking</title>
  <desc>A simplified conceptual diagram showing how power resilience, cooling and heat rejection, and controls and monitoring must be integrated around the IT load in a high-density data centre. The figure highlights construction implications including MEP coordination, interface management, commissioning readiness, and maintainable access.</desc>

  <!-- Canvas Background -->
  <rect width="1600" height="1000" fill="#FFFFFF"/>

  <!-- ================= Controls & Monitoring Panel (Top) ================= -->
  <g id="controls-panel">
    <!-- Panel Background (Light Grey/Blue Fill, Slate Grey Border) -->
    <rect x="500" y="70" width="600" height="170" rx="12" ry="12" fill="#F7FAFC" stroke="#6A6A6A" stroke-width="1.5"/>
    <!-- Rounded Header Bar -->
    <path d="M 500 82 A 12 12 0 0 1 512 70 L 1088 70 A 12 12 0 0 1 1100 82 L 1100 110 L 500 110 Z" fill="#6A6A6A"/>
    <!-- Panel Title -->
    <text x="800" y="96" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Controls and Monitoring</text>

    <!-- Component Box 1: Sensors & Meters -->
    <rect x="520" y="135" width="160" height="70" rx="8" ry="8" fill="#FFFFFF" stroke="#6A6A6A" stroke-width="1"/>
    <text x="600" y="165" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">Sensors &amp; Meters</text>
    <text x="600" y="185" font-family="Arial, sans-serif" font-size="11" fill="#555555" text-anchor="middle">Temp, flow &amp; power data</text>

    <!-- Flow Arrow 1 -> 2 -->
    <line x1="680" y1="170" x2="713" y2="170" stroke="#6A6A6A" stroke-width="1.5"/>
    <polygon points="711,166 711,174 720,170" fill="#6A6A6A"/>

    <!-- Component Box 2: BMS / DCIM Platform -->
    <rect x="720" y="135" width="160" height="70" rx="8" ry="8" fill="#FFFFFF" stroke="#6A6A6A" stroke-width="1"/>
    <text x="800" y="165" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">BMS / DCIM Platform</text>
    <!-- Updated subtext to "Control platform" to prevent crowding -->
    <text x="800" y="185" font-family="Arial, sans-serif" font-size="11" fill="#555555" text-anchor="middle">Control platform</text>

    <!-- Flow Arrow 2 -> 3 -->
    <line x1="880" y1="170" x2="913" y2="170" stroke="#6A6A6A" stroke-width="1.5"/>
    <polygon points="911,166 911,174 920,170" fill="#6A6A6A"/>

    <!-- Component Box 3: Monitoring & Alarms -->
    <rect x="920" y="135" width="160" height="70" rx="8" ry="8" fill="#FFFFFF" stroke="#6A6A6A" stroke-width="1"/>
    <text x="1000" y="165" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">Monitoring &amp; Alarms</text>
    <text x="1000" y="185" font-family="Arial, sans-serif" font-size="11" fill="#555555" text-anchor="middle">Optimisation &amp; alerts</text>
  </g>


  <!-- ================= Power Resilience Panel (Left) ================= -->
  <g id="power-panel">
    <!-- Panel Background -->
    <rect x="80" y="260" width="360" height="380" rx="12" ry="12" fill="#F7FAFC" stroke="#1F5D7A" stroke-width="1.5"/>
    <!-- Rounded Header Bar -->
    <path d="M 80 272 A 12 12 0 0 1 92 260 L 428 260 A 12 12 0 0 1 440 272 L 440 300 L 80 300 Z" fill="#1F5D7A"/>
    <!-- Panel Title -->
    <text x="260" y="286" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Power Resilience</text>

    <!-- Box 1: Grid / Utility Connection -->
    <rect x="120" y="312" width="280" height="45" rx="8" ry="8" fill="#FFFFFF" stroke="#1F5D7A" stroke-width="1"/>
    <text x="260" y="330" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">Grid / Utility Connection</text>
    <text x="260" y="347" font-family="Arial, sans-serif" font-size="11" fill="#555555" text-anchor="middle">High-voltage primary supply</text>

    <!-- Arrow 1 -> 2 -->
    <line x1="260" y1="357" x2="260" y2="371" stroke="#1F5D7A" stroke-width="1.5"/>
    <polygon points="256,369 264,369 260,378" fill="#1F5D7A"/>

    <!-- Box 2: Substation & Transformer -->
    <rect x="120" y="378" width="280" height="45" rx="8" ry="8" fill="#FFFFFF" stroke="#1F5D7A" stroke-width="1"/>
    <text x="260" y="396" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">Substation &amp; Transformer</text>
    <text x="260" y="413" font-family="Arial, sans-serif" font-size="11" fill="#555555" text-anchor="middle">Voltage stepping &amp; safety controls</text>

    <!-- Arrow 2 -> 3 -->
    <line x1="260" y1="423" x2="260" y2="437" stroke="#1F5D7A" stroke-width="1.5"/>
    <polygon points="256,435 264,435 260,444" fill="#1F5D7A"/>

    <!-- Box 3: Switchgear & ATS -->
    <rect x="120" y="444" width="280" height="45" rx="8" ry="8" fill="#FFFFFF" stroke="#1F5D7A" stroke-width="1"/>
    <text x="260" y="462" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">Switchgear &amp; ATS</text>
    <text x="260" y="479" font-family="Arial, sans-serif" font-size="11" fill="#555555" text-anchor="middle">Main switches &amp; transfer logic</text>

    <!-- Arrow 3 -> 4 -->
    <line x1="260" y1="489" x2="260" y2="503" stroke="#1F5D7A" stroke-width="1.5"/>
    <polygon points="256,501 264,501 260,510" fill="#1F5D7A"/>

    <!-- Box 4: UPS & Backup Generators -->
    <rect x="120" y="510" width="280" height="45" rx="8" ry="8" fill="#FFFFFF" stroke="#1F5D7A" stroke-width="1"/>
    <text x="260" y="528" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">UPS &amp; Backup Generators</text>
    <text x="260" y="545" font-family="Arial, sans-serif" font-size="11" fill="#555555" text-anchor="middle">Temporary ride-through &amp; backup power</text>

    <!-- Arrow 4 -> 5 -->
    <line x1="260" y1="555" x2="260" y2="565" stroke="#1F5D7A" stroke-width="1.5"/>
    <polygon points="256,563 264,563 260,572" fill="#1F5D7A"/>

    <!-- Box 5: Power Distribution Units (PDUs) -->
    <rect x="120" y="572" width="280" height="45" rx="8" ry="8" fill="#FFFFFF" stroke="#1F5D7A" stroke-width="1"/>
    <text x="260" y="590" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">Power Distribution Units (PDUs)</text>
    <text x="260" y="607" font-family="Arial, sans-serif" font-size="11" fill="#555555" text-anchor="middle">Final voltage control &amp; rack delivery</text>
  </g>


  <!-- ================= Cooling & Heat Rejection Panel (Right) ================= -->
  <g id="cooling-panel">
    <!-- Panel Background -->
    <rect x="1160" y="260" width="360" height="380" rx="12" ry="12" fill="#F7FAFC" stroke="#2A7F8F" stroke-width="1.5"/>
    <!-- Rounded Header Bar -->
    <path d="M 1160 272 A 12 12 0 0 1 1172 260 L 1508 260 A 12 12 0 0 1 1520 272 L 1520 300 L 1160 300 Z" fill="#2A7F8F"/>
    <!-- Panel Title -->
    <text x="1340" y="286" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Cooling &amp; Heat Rejection</text>

    <!-- Box 1: Heat from IT Load -->
    <rect x="1200" y="335" width="280" height="45" rx="8" ry="8" fill="#FFFFFF" stroke="#2A7F8F" stroke-width="1"/>
    <text x="1340" y="353" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">Heat from IT Load</text>
    <text x="1340" y="370" font-family="Arial, sans-serif" font-size="11" fill="#555555" text-anchor="middle">High-density thermal energy generation</text>

    <!-- Arrow 1 -> 2 -->
    <line x1="1340" y1="380" x2="1340" y2="403" stroke="#2A7F8F" stroke-width="1.5"/>
    <polygon points="1336,401 1344,401 1340,410" fill="#2A7F8F"/>

    <!-- Box 2: Air / Liquid Cooling Systems -->
    <rect x="1200" y="410" width="280" height="45" rx="8" ry="8" fill="#FFFFFF" stroke="#2A7F8F" stroke-width="1"/>
    <text x="1340" y="428" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">Air / Liquid Cooling Systems</text>
    <text x="1340" y="445" font-family="Arial, sans-serif" font-size="11" fill="#555555" text-anchor="middle">In-row, CRAC, or liquid-to-rack</text>

    <!-- Arrow 2 -> 3 -->
    <line x1="1340" y1="455" x2="1340" y2="478" stroke="#2A7F8F" stroke-width="1.5"/>
    <polygon points="1336,476 1344,476 1340,485" fill="#2A7F8F"/>

    <!-- Box 3: Chilled Water / DX Plant -->
    <rect x="1200" y="485" width="280" height="45" rx="8" ry="8" fill="#FFFFFF" stroke="#2A7F8F" stroke-width="1"/>
    <text x="1340" y="503" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">Chilled Water / DX Plant</text>
    <text x="1340" y="520" font-family="Arial, sans-serif" font-size="11" fill="#555555" text-anchor="middle">Chillers, pumps &amp; heat exchangers</text>

    <!-- Arrow 3 -> 4 -->
    <line x1="1340" y1="530" x2="1340" y2="553" stroke="#2A7F8F" stroke-width="1.5"/>
    <polygon points="1336,551 1344,551 1340,560" fill="#2A7F8F"/>

    <!-- Box 4: Heat Rejection -->
    <rect x="1200" y="560" width="280" height="45" rx="8" ry="8" fill="#FFFFFF" stroke="#2A7F8F" stroke-width="1"/>
    <text x="1340" y="578" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">Heat Rejection</text>
    <text x="1340" y="595" font-family="Arial, sans-serif" font-size="11" fill="#555555" text-anchor="middle">Cooling towers &amp; dry coolers</text>
  </g>


  <!-- ================= Central IT Load Box (Widened to 520px & Vertically Stretched to 280px) ================= -->
  <g id="centre-it-load">
    <rect x="540" y="320" width="520" height="280" rx="12" ry="12" fill="#DCE6EF" stroke="#0F4761" stroke-width="3"/>
    <!-- Header -->
    <text x="800" y="360" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0F4761" text-anchor="middle">IT Load / Server Racks</text>

    <!-- Visual Server Rack 1 -->
    <g transform="translate(575, 405)">
      <rect x="0" y="0" width="85" height="135" rx="6" ry="6" fill="#FFFFFF" stroke="#0F4761" stroke-width="1.5"/>
      <!-- Cabinet Header -->
      <rect x="0" y="0" width="85" height="15" rx="6" ry="6" fill="#0F4761"/>
      <rect x="0" y="10" width="85" height="5" fill="#0F4761"/>
      <!-- Server Blades -->
      <g transform="translate(8, 25)">
        <!-- Blade 1 -->
        <rect x="0" y="0" width="69" height="12" rx="2" ry="2" fill="#E9EEF3" stroke="#6A6A6A" stroke-width="0.75"/>
        <circle cx="8" cy="6" r="2.5" fill="#4CAF50"/>
        <!-- Blade 2 -->
        <rect x="0" y="18" width="69" height="12" rx="2" ry="2" fill="#E9EEF3" stroke="#6A6A6A" stroke-width="0.75"/>
        <circle cx="8" cy="24" r="2.5" fill="#4CAF50"/>
        <!-- Blade 3 -->
        <rect x="0" y="36" width="69" height="12" rx="2" ry="2" fill="#E9EEF3" stroke="#6A6A6A" stroke-width="0.75"/>
        <circle cx="8" cy="42" r="2.5" fill="#FF9800"/>
        <!-- Blade 4 -->
        <rect x="0" y="54" width="69" height="12" rx="2" ry="2" fill="#E9EEF3" stroke="#6A6A6A" stroke-width="0.75"/>
        <circle cx="8" cy="60" r="2.5" fill="#4CAF50"/>
        <!-- Blade 5 -->
        <rect x="0" y="72" width="69" height="12" rx="2" ry="2" fill="#E9EEF3" stroke="#6A6A6A" stroke-width="0.75"/>
        <circle cx="8" cy="78" r="2.5" fill="#4CAF50"/>
      </g>
    </g>

    <!-- Visual Server Rack 2 -->
    <g transform="translate(675, 405)">
      <rect x="0" y="0" width="85" height="135" rx="6" ry="6" fill="#FFFFFF" stroke="#0F4761" stroke-width="1.5"/>
      <!-- Cabinet Header -->
      <rect x="0" y="0" width="85" height="15" rx="6" ry="6" fill="#0F4761"/>
      <rect x="0" y="10" width="85" height="5" fill="#0F4761"/>
      <!-- Server Blades -->
      <g transform="translate(8, 25)">
        <!-- Blade 1 -->
        <rect x="0" y="0" width="69" height="12" rx="2" ry="2" fill="#E9EEF3" stroke="#6A6A6A" stroke-width="0.75"/>
        <circle cx="8" cy="6" r="2.5" fill="#4CAF50"/>
        <!-- Blade 2 -->
        <rect x="0" y="18" width="69" height="12" rx="2" ry="2" fill="#E9EEF3" stroke="#6A6A6A" stroke-width="0.75"/>
        <circle cx="8" cy="24" r="2.5" fill="#4CAF50"/>
        <!-- Blade 3 -->
        <rect x="0" y="36" width="69" height="12" rx="2" ry="2" fill="#E9EEF3" stroke="#6A6A6A" stroke-width="0.75"/>
        <circle cx="8" cy="42" r="2.5" fill="#4CAF50"/>
        <!-- Blade 4 -->
        <rect x="0" y="54" width="69" height="12" rx="2" ry="2" fill="#E9EEF3" stroke="#6A6A6A" stroke-width="0.75"/>
        <circle cx="8" cy="60" r="2.5" fill="#4CAF50"/>
        <!-- Blade 5 -->
        <rect x="0" y="72" width="69" height="12" rx="2" ry="2" fill="#E9EEF3" stroke="#6A6A6A" stroke-width="0.75"/>
        <circle cx="8" cy="78" r="2.5" fill="#4CAF50"/>
      </g>
    </g>

    <!-- Key Descriptive Text Bullets (With Wording Updates) -->
    <g transform="translate(780, 425)">
      <!-- Bullet 1 -->
      <circle cx="10" cy="12" r="4.5" fill="#0F4761"/>
      <text x="25" y="17" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333">High-density compute load</text>
      <text x="25" y="34" font-family="Arial, sans-serif" font-size="11" fill="#555555">High energy intensity</text>

      <!-- Bullet 2 -->
      <circle cx="10" cy="62" r="4.5" fill="#0F4761"/>
      <!-- Updated wording: "Continuous power and cooling" -->
      <text x="25" y="67" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333">Continuous power and cooling</text>
      <!-- Updated wording: "Requires resilience and high availability" -->
      <text x="25" y="84" font-family="Arial, sans-serif" font-size="11" fill="#555555">Requires resilience and high availability</text>
    </g>
  </g>


  <!-- ================= Integration / Connection Flows ================= -->
  <!-- 1. Power Distribution -> IT Load (Direct Horizontal Flow - Zero Bends) -->
  <g id="power-to-it-flow">
    <!-- Clean horizontal line from Box 5 (center y=594.5) directly to IT Load (ends x=540) -->
    <line x1="400" y1="594.5" x2="532" y2="594.5" stroke="#1F5D7A" stroke-width="3.5"/>
    <polygon points="532,589.5 532,599.5 540,594.5" fill="#1F5D7A"/>
    <!-- Wording shortened to "Power flow" and placed above the arrow with 16px clearance -->
    <text x="490" y="578" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1F5D7A" text-anchor="middle">Power flow</text>
  </g>

  <!-- 2. IT Load -> Cooling Panel (Heat Out - Clean Horizontal Arrow) -->
  <g id="it-to-cooling-flow">
    <!-- Horizontal line from IT Load right edge (x=1060) to Box 1 center (y=357.5) -->
    <line x1="1060" y1="357.5" x2="1192" y2="357.5" stroke="#2A7F8F" stroke-width="3.5"/>
    <polygon points="1192,352.5 1192,362.5 1200,357.5" fill="#2A7F8F"/>
    <!-- Wording changed to "Heat out" and placed above the arrow with 15px clearance -->
    <text x="1110" y="342.5" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2A7F8F" text-anchor="middle">Heat out</text>
  </g>

  <!-- 3. Cooling Panel -> IT Load (Cooling In - Clean Horizontal Arrow) -->
  <g id="cooling-to-it-flow">
    <!-- Horizontal line from Box 2 center (y=432.5) to IT Load right edge (x=1060) -->
    <line x1="1200" y1="432.5" x2="1068" y2="432.5" stroke="#2A7F8F" stroke-width="3.5"/>
    <polygon points="1068,427.5 1068,437.5 1060,432.5" fill="#2A7F8F"/>
    <!-- Wording changed to "Cooling in" and placed below the arrow with 20px clearance -->
    <text x="1110" y="452.5" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2A7F8F" text-anchor="middle">Cooling in</text>
  </g>


  <!-- ================= Controls Dashed Feedback Flows (Simplified: Only Vertical) ================= -->
  <!-- 1. Main Central BMS / DCIM Platform -> IT Load Feedback (Dashed, Bidirectional) -->
  <g id="controls-it-feedback">
    <line x1="800" y1="240" x2="800" y2="312" stroke="#6A6A6A" stroke-width="2" stroke-dasharray="6,4"/>
    <polygon points="796,248 804,248 800,240" fill="#6A6A6A"/>
    <polygon points="796,312 804,312 800,320" fill="#6A6A6A"/>
    <!-- Central Unified Label -->
    <text x="815" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6A6A6A" text-anchor="start">Monitoring and control feedback</text>
  </g>


  <!-- ================= Central IT Load -> Bottom Strip Transition ================= -->
  <g id="central-to-bottom-flow">
    <!-- Top segment of arrow -->
    <line x1="800" y1="600" x2="800" y2="645" stroke="#0F4761" stroke-width="3.5"/>
    
    <!-- Transition Text (Updated wording: colon removed and "access" added) -->
    <text x="800" y="672" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0F4761" text-anchor="middle">Successful delivery depends on</text>
    <text x="800" y="695" font-family="Arial, sans-serif" font-size="15" fill="#333333" text-anchor="middle">coordinated power, cooling, controls, access and commissioning</text>

    <!-- Bottom segment of arrow with arrowhead -->
    <line x1="800" y1="715" x2="800" y2="791" stroke="#0F4761" stroke-width="3.5"/>
    <polygon points="794,789 806,789 800,800" fill="#0F4761"/>
  </g>


  <!-- ================= Bottom Construction Implications Strip (More Compact) ================= -->
  <g id="construction-strip">
    <!-- Strip Background (Reduced height to 120px, repositioned to y=800) -->
    <rect x="120" y="800" width="1360" height="120" rx="12" ry="12" fill="#E9EEF3" stroke="#0F4761" stroke-width="1.5"/>
    <!-- Strip Header (Bolded and kept at font-size 18) -->
    <text x="140" y="827" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0F4761" text-anchor="start">Why this matters for construction professionals</text>

    <!-- Box 1: MEP Coordination -->
    <rect x="140" y="845" width="300" height="55" rx="8" ry="8" fill="#FFFFFF" stroke="#0F4761" stroke-width="1"/>
    <text x="290" y="868" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0F4761" text-anchor="middle">MEP Coordination</text>
    <text x="290" y="887" font-family="Arial, sans-serif" font-size="10.5" fill="#333333" text-anchor="middle">Spatial routing &amp; clash avoidance</text>

    <!-- Box 2: Interface Management -->
    <rect x="480" y="845" width="300" height="55" rx="8" ry="8" fill="#FFFFFF" stroke="#0F4761" stroke-width="1"/>
    <text x="630" y="868" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0F4761" text-anchor="middle">Interface Management</text>
    <text x="630" y="887" font-family="Arial, sans-serif" font-size="10.5" fill="#333333" text-anchor="middle">Power, cooling, &amp; control connections</text>

    <!-- Box 3: Commissioning Readiness -->
    <rect x="820" y="845" width="300" height="55" rx="8" ry="8" fill="#FFFFFF" stroke="#0F4761" stroke-width="1"/>
    <text x="970" y="868" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0F4761" text-anchor="middle">Commissioning Readiness</text>
    <text x="970" y="887" font-family="Arial, sans-serif" font-size="10.5" fill="#333333" text-anchor="middle">System testing, validation &amp; handoff</text>

    <!-- Box 4: Maintainable Access -->
    <rect x="1160" y="845" width="300" height="55" rx="8" ry="8" fill="#FFFFFF" stroke="#0F4761" stroke-width="1"/>
    <text x="1310" y="868" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0F4761" text-anchor="middle">Maintainable Access</text>
    <text x="1310" y="887" font-family="Arial, sans-serif" font-size="10.5" fill="#333333" text-anchor="middle">Clearances for equipment lifecycle</text>
  </g>
</svg>
