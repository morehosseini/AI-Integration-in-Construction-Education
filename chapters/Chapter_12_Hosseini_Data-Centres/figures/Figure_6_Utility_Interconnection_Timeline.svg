<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="850" viewBox="0 0 1600 850" role="img" aria-labelledby="figure-title figure-desc">
  <title id="figure-title">Typical utility interconnection and energisation pathway for data centres</title>
  <desc id="figure-desc">A horizontal timeline showing six stages from application and grid feasibility through testing, commissioning and energisation, with a dashed extension showing that constrained markets may extend delivery from 60 to 96 or more months.</desc>

  <!-- Canvas Background -->
  <rect width="1600" height="850" fill="#FFFFFF"/>

  <!-- Connector Lines (Dashed, connecting milestone cards to the timeline) -->
  <!-- Top cards connect from Y=310 down to Y=410 -->
  <line x1="155" y1="310" x2="155" y2="410" stroke="#000F46" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="485" y1="310" x2="485" y2="410" stroke="#000F46" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="870" y1="310" x2="870" y2="410" stroke="#000F46" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="1350" y1="310" x2="1350" y2="410" stroke="#B45F06" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Bottom cards connect from Y=410 down to Y=510 -->
  <line x1="320" y1="410" x2="320" y2="510" stroke="#000F46" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="650" y1="410" x2="650" y2="510" stroke="#000F46" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="1090" y1="410" x2="1090" y2="510" stroke="#000F46" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Central Timeline Axis (Shifted downward to Y = 410) -->
  <line x1="80" y1="410" x2="1200" y2="410" stroke="#000F46" stroke-width="8" stroke-linecap="round"/>
  <line x1="1200" y1="410" x2="1500" y2="410" stroke="#B45F06" stroke-width="8" stroke-dasharray="15,10" stroke-linecap="round"/>
  <polygon points="1500,402 1516,410 1500,418" fill="#B45F06"/>

  <!-- Timeline Milestone Marker Ticks -->
  <circle cx="100" cy="410" r="8" fill="#FFFFFF" stroke="#000F46" stroke-width="3"/>
  <circle cx="210" cy="410" r="8" fill="#FFFFFF" stroke="#000F46" stroke-width="3"/>
  <circle cx="430" cy="410" r="8" fill="#FFFFFF" stroke="#000F46" stroke-width="3"/>
  <circle cx="540" cy="410" r="8" fill="#FFFFFF" stroke="#000F46" stroke-width="3"/>
  <circle cx="760" cy="410" r="8" fill="#FFFFFF" stroke="#000F46" stroke-width="3"/>
  <circle cx="980" cy="410" r="8" fill="#FFFFFF" stroke="#000F46" stroke-width="3"/>
  <circle cx="1200" cy="410" r="8" fill="#FFFFFF" stroke="#000F46" stroke-width="3"/>
  <circle cx="1500" cy="410" r="8" fill="#FFFFFF" stroke="#B45F06" stroke-width="3"/>

  <!-- ================= Milestone Cards (Consistent Width=260, Height=150) ================= -->

  <!-- Milestone 1 (Above, Y = 160-310) -->
  <g id="milestone-1">
    <rect x="25" y="160" width="260" height="150" rx="12" fill="#FFFFFF" stroke="#000F46" stroke-width="2"/>
    <text x="155" y="198" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#000F46" text-anchor="middle">01</text>
    <text x="155" y="232" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333333" text-anchor="middle">Application and</text>
    <text x="155" y="258" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333333" text-anchor="middle">grid feasibility</text>
    <text x="155" y="292" font-family="Arial, sans-serif" font-size="19" fill="#2F6F8F" text-anchor="middle">0–6 months</text>
  </g>

  <!-- Milestone 2 (Below, Y = 510-660) -->
  <g id="milestone-2">
    <rect x="190" y="510" width="260" height="150" rx="12" fill="#FFFFFF" stroke="#000F46" stroke-width="2"/>
    <text x="320" y="548" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#000F46" text-anchor="middle">02</text>
    <text x="320" y="582" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333333" text-anchor="middle">System impact and</text>
    <text x="320" y="608" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333333" text-anchor="middle">facility studies</text>
    <text x="320" y="642" font-family="Arial, sans-serif" font-size="19" fill="#2F6F8F" text-anchor="middle">6–18 months</text>
  </g>

  <!-- Milestone 3 (Above, Y = 160-310) -->
  <g id="milestone-3">
    <rect x="355" y="160" width="260" height="150" rx="12" fill="#FFFFFF" stroke="#000F46" stroke-width="2"/>
    <text x="485" y="198" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#000F46" text-anchor="middle">03</text>
    <text x="485" y="232" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333333" text-anchor="middle">Interconnection</text>
    <text x="485" y="258" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333333" text-anchor="middle">agreement and FEED</text>
    <text x="485" y="292" font-family="Arial, sans-serif" font-size="19" fill="#2F6F8F" text-anchor="middle">18–24 months</text>
  </g>

  <!-- Milestone 4 (Below, Y = 510-660) -->
  <g id="milestone-4">
    <rect x="520" y="510" width="260" height="150" rx="12" fill="#FFFFFF" stroke="#000F46" stroke-width="2"/>
    <text x="650" y="548" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#000F46" text-anchor="middle">04</text>
    <text x="650" y="582" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333333" text-anchor="middle">Long-lead equipment</text>
    <text x="650" y="608" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333333" text-anchor="middle">procurement</text>
    <text x="650" y="642" font-family="Arial, sans-serif" font-size="19" fill="#2F6F8F" text-anchor="middle">24–36 months</text>
  </g>

  <!-- Milestone 5 (Above, Y = 160-310) -->
  <g id="milestone-5">
    <rect x="740" y="160" width="260" height="150" rx="12" fill="#FFFFFF" stroke="#000F46" stroke-width="2"/>
    <text x="870" y="198" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#000F46" text-anchor="middle">05</text>
    <text x="870" y="232" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333333" text-anchor="middle">Substation construction</text>
    <text x="870" y="258" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333333" text-anchor="middle">and grid reinforcement</text>
    <text x="870" y="292" font-family="Arial, sans-serif" font-size="19" fill="#2F6F8F" text-anchor="middle">36–48 months</text>
  </g>

  <!-- Milestone 6 (Below, Y = 510-660) -->
  <g id="milestone-6">
    <rect x="960" y="510" width="260" height="150" rx="12" fill="#FFFFFF" stroke="#000F46" stroke-width="2"/>
    <text x="1090" y="548" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#000F46" text-anchor="middle">06</text>
    <text x="1090" y="582" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333333" text-anchor="middle">Testing, commissioning</text>
    <text x="1090" y="608" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333333" text-anchor="middle">and energisation</text>
    <text x="1090" y="642" font-family="Arial, sans-serif" font-size="19" fill="#2F6F8F" text-anchor="middle">48–60+ months</text>
  </g>

  <!-- Market Extension Card (Above, Y = 160-310, Reduced Visual Dominance) -->
  <g id="milestone-extension">
    <rect x="1220" y="160" width="260" height="150" rx="12" fill="#FFFBF7" stroke="#B45F06" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="1350" y="198" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#B45F06" text-anchor="middle">RISK ZONE</text>
    <text x="1350" y="232" font-family="Arial, sans-serif" font-size="19" fill="#333333" text-anchor="middle">Possible extension in</text>
    <text x="1350" y="258" font-family="Arial, sans-serif" font-size="19" fill="#333333" text-anchor="middle">constrained markets</text>
    <text x="1350" y="292" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#B45F06" text-anchor="middle">60–96+ months</text>
  </g>

  <!-- ================= Educational Callout Boxes ================= -->

  <!-- Callout 1: De-risking point (above Card 3) -->
  <!-- Shifted slightly to accommodate top margin: Y = 15-125 -->
  <g id="callout-1">
    <rect x="315" y="15" width="340" height="110" rx="8" fill="#DCE6EF" stroke="#2F6F8F" stroke-width="1.5"/>
    <text x="485" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#000F46" text-anchor="middle">De-risking point</text>
    <text x="485" y="72" font-family="Arial, sans-serif" font-size="17" fill="#333333" text-anchor="middle">FEED studies &amp; reservation fees confirm</text>
    <text x="485" y="96" font-family="Arial, sans-serif" font-size="17" fill="#333333" text-anchor="middle">sponsor commitment before major works.</text>
    <line x1="485" y1="125" x2="485" y2="160" stroke="#2F6F8F" stroke-width="1.5"/>
  </g>

  <!-- Callout 2: Supply-chain bottleneck (below Card 4, shifted to Y = 675-775) -->
  <g id="callout-2">
    <rect x="480" y="675" width="340" height="100" rx="8" fill="#DCE6EF" stroke="#2F6F8F" stroke-width="1.5"/>
    <text x="650" y="702" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#000F46" text-anchor="middle">Supply-chain bottleneck</text>
    <text x="650" y="730" font-family="Arial, sans-serif" font-size="17" fill="#333333" text-anchor="middle">Transformers and switchgear can</text>
    <text x="650" y="754" font-family="Arial, sans-serif" font-size="17" fill="#333333" text-anchor="middle">drive critical-path delays.</text>
    <line x1="650" y1="660" x2="650" y2="675" stroke="#2F6F8F" stroke-width="1.5"/>
  </g>

  <!-- Callout 3: Project delivery risk (below Extension, shifted to Y = 675-785) -->
  <!-- Pointer connects vertically from the dashed timeline segment at X = 1370 -->
  <g id="callout-3">
    <rect x="1200" y="675" width="340" height="110" rx="8" fill="#DCE6EF" stroke="#2F6F8F" stroke-width="1.5"/>
    <text x="1370" y="702" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#000F46" text-anchor="middle">Project delivery risk</text>
    <text x="1370" y="730" font-family="Arial, sans-serif" font-size="17" fill="#333333" text-anchor="middle">Late grid works can create stranded</text>
    <text x="1370" y="754" font-family="Arial, sans-serif" font-size="17" fill="#333333" text-anchor="middle">asset risk and delayed revenue.</text>
    <line x1="1370" y1="418" x2="1370" y2="675" stroke="#2F6F8F" stroke-width="1.5" stroke-dasharray="3,3"/>
    <circle cx="1370" cy="418" r="3" fill="#2F6F8F"/>
  </g>

  <!-- ================= Cumulative Months Axis (At Bottom, Shifted to Y = 810) ================= -->
  <g id="bottom-axis">
    <!-- Horizontal Axis Baseline -->
    <line x1="80" y1="810" x2="1500" y2="810" stroke="#333333" stroke-width="2"/>
    <text x="80" y="802" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#555555" text-anchor="start">Cumulative project months</text>

    <!-- Ticks -->
    <line x1="100" y1="810" x2="100" y2="820" stroke="#333333" stroke-width="2"/>
    <line x1="210" y1="810" x2="210" y2="820" stroke="#333333" stroke-width="2"/>
    <line x1="430" y1="810" x2="430" y2="820" stroke="#333333" stroke-width="2"/>
    <line x1="540" y1="810" x2="540" y2="820" stroke="#333333" stroke-width="2"/>
    <line x1="760" y1="810" x2="760" y2="820" stroke="#333333" stroke-width="2"/>
    <line x1="980" y1="810" x2="980" y2="820" stroke="#333333" stroke-width="2"/>
    <line x1="1200" y1="810" x2="1200" y2="820" stroke="#333333" stroke-width="2"/>
    <line x1="1500" y1="810" x2="1500" y2="820" stroke="#B45F06" stroke-width="2"/>

    <!-- Labels -->
    <text x="100" y="842" font-family="Arial, sans-serif" font-size="20" fill="#333333" text-anchor="middle">0</text>
    <text x="210" y="842" font-family="Arial, sans-serif" font-size="20" fill="#333333" text-anchor="middle">6</text>
    <text x="430" y="842" font-family="Arial, sans-serif" font-size="20" fill="#333333" text-anchor="middle">18</text>
    <text x="540" y="842" font-family="Arial, sans-serif" font-size="20" fill="#333333" text-anchor="middle">24</text>
    <text x="760" y="842" font-family="Arial, sans-serif" font-size="20" fill="#333333" text-anchor="middle">36</text>
    <text x="980" y="842" font-family="Arial, sans-serif" font-size="20" fill="#333333" text-anchor="middle">48</text>
    <text x="1200" y="842" font-family="Arial, sans-serif" font-size="20" fill="#333333" text-anchor="middle">60</text>
    <text x="1500" y="842" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#B45F06" text-anchor="middle">96+ months</text>
  </g>
</svg>
