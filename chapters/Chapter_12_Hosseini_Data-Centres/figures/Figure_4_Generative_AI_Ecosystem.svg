    <circle cx="326" cy="351" r="4" fill="#1F2933" stroke="none"/>
    <circle cx="345" cy="351" r="4" fill="#1F2933" stroke="none"/>
    <path d="M402 310 L413 338 L441 349 L413 360 L402 388 L391 360 L363 349 L391 338 Z"/>
