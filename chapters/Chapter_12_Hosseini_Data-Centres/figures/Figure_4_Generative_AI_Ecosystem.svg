  </g>
  <text x="500" y="875" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#1F2933">3) Compute Hardware</text>
  <text x="500" y="920" font-family="Arial, sans-serif" font-size="28" fill="#1F2933">• Racks and servers</text>
  <text x="500" y="956" font-family="Arial, sans-serif" font-size="28" fill="#1F2933">• GPUs, TPUs, and AI chips</text>
  <text x="500" y="992" font-family="Arial, sans-serif" font-size="28" fill="#1F2933">• Storage and high-speed networking</text>
  <text x="500" y="1028" font-family="Arial, sans-serif" font-size="28" fill="#1F2933">• Liquid cooling for high-density racks</text>

  <!-- Dependency arrow -->
  <line x1="800" y1="1080" x2="800" y2="1048" stroke="#4B5563" stroke-width="4" marker-end="url(#arrow-grey)"/>

  <!-- Layer 2 -->
  <rect x="230" y="1090" width="1140" height="220" rx="28" fill="#F6C39B" stroke="#4B5563" stroke-width="4"/>
