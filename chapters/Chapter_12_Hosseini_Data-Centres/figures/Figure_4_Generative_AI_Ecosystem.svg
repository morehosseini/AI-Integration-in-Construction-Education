<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1900" viewBox="0 0 1600 1900" role="img" aria-labelledby="figure-title figure-desc">
  <title id="figure-title">The AI Physical-to-Digital Stack for Data Centres</title>
  <desc id="figure-desc">A five-layer stack showing how physical sites and utilities, data centre facility systems, compute hardware, platforms and models, and applications together enable generative AI.</desc>

  <defs>
    <marker id="arrow-grey" markerWidth="18" markerHeight="18" refX="16" refY="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 1 1 L 17 9 L 1 17 Z" fill="#4B5563"/>
    </marker>
    <marker id="arrow-orange" markerWidth="30" markerHeight="30" refX="27" refY="15" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 1 1 L 29 15 L 1 29 Z" fill="#D96F32"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="1900" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="800" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="58" font-weight="700" fill="#1F2933">The AI Physical-to-Digital Stack for Data Centres</text>
  <text x="800" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-style="italic" fill="#4B5563">How data centre infrastructure enables generative AI applications</text>
  <line x1="390" y1="205" x2="1210" y2="205" stroke="#D7DEE5" stroke-width="3"/>

  <!-- Side arrows and labels -->
  <line x1="112" y1="322" x2="112" y2="1518" stroke="#4B5563" stroke-width="4" marker-end="url(#arrow-grey)"/>
  <text x="58" y="920" text-anchor="middle" transform="rotate(-90 58 920)" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1F2933">Energy, cooling, and physical constraints increase downward</text>

  <line x1="1530" y1="1518" x2="1530" y2="322" stroke="#4B5563" stroke-width="4" marker-end="url(#arrow-grey)"/>
  <text x="1580" y="920" text-anchor="middle" transform="rotate(-90 1580 920)" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1F2933">Abstraction and software complexity increase upward</text>

  <!-- Layer 5 -->
  <rect x="230" y="280" width="1140" height="220" rx="28" fill="#9AAFEA" stroke="#4B5563" stroke-width="4"/>
  <g fill="none" stroke="#1F2933" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="285" y="335" width="150" height="105" rx="10"/>
    <line x1="285" y1="368" x2="435" y2="368"/>
