  <text x="500" y="1413" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#1F2933">1) Physical Site and Utilities</text>
  <text x="500" y="1457" font-family="Arial, sans-serif" font-size="27" fill="#1F2933">• Grid power, substations, renewables</text>
  <text x="500" y="1491" font-family="Arial, sans-serif" font-size="27" fill="#1F2933">• Water supply for cooling</text>
  <text x="500" y="1525" font-family="Arial, sans-serif" font-size="27" fill="#1F2933">• Fibre connectivity and backhaul</text>
  <text x="500" y="1559" font-family="Arial, sans-serif" font-size="27" fill="#1F2933">• Land, planning, and permits</text>

  <!-- Demand feedback -->
  <path d="M1380 390 C1465 410 1480 650 1450 790 C1432 875 1408 925 1385 950" fill="none" stroke="#D96F32" stroke-width="9" stroke-linecap="round" marker-end="url(#arrow-orange)"/>
  <text x="1473" y="660" text-anchor="middle" transform="rotate(90 1473 660)" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#B95623">Demand drives compute and facility expansion</text>

  <!-- Cross-cutting concerns -->
  <line x1="350" y1="1670" x2="1250" y2="1670" stroke="#D7DEE5" stroke-width="3"/>
  <text x="800" y="1730" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-style="italic" fill="#1F2933">Cross-cutting concerns: Security • Sustainability • Observability</text>
</svg>
