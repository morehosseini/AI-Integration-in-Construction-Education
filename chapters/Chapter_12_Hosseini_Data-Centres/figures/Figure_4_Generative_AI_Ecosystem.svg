    <path d="M307 1402 L278 1450 L307 1450 L292 1490 L343 1435 L315 1435 L333 1402 Z"/>
    <path d="M397 1407 C397 1407 365 1443 365 1466 C365 1487 379 1501 397 1501 C415 1501 429 1487 429 1466 C429 1443 397 1407 397 1407 Z"/>
