  </g>
  <text x="500" y="605" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#1F2933">4) Platforms and Models</text>
  <text x="500" y="650" font-family="Arial, sans-serif" font-size="28" fill="#1F2933">• Orchestration and scheduling</text>
  <text x="500" y="686" font-family="Arial, sans-serif" font-size="28" fill="#1F2933">• Distributed training and inference</text>
  <text x="500" y="722" font-family="Arial, sans-serif" font-size="28" fill="#1F2933">• Data pipelines and MLOps</text>
  <text x="500" y="758" font-family="Arial, sans-serif" font-size="28" fill="#1F2933">• Foundation models and LLMs</text>

  <!-- Dependency arrow -->
  <line x1="800" y1="810" x2="800" y2="778" stroke="#4B5563" stroke-width="4" marker-end="url(#arrow-grey)"/>

  <!-- Layer 3 -->
  <rect x="230" y="820" width="1140" height="220" rx="28" fill="#E8EEF3" stroke="#4B5563" stroke-width="4"/>
  <g fill="none" stroke="#1F2933" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
