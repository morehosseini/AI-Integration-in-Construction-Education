  </g>
  <text x="500" y="335" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#1F2933">5) Applications</text>
  <text x="500" y="380" font-family="Arial, sans-serif" font-size="28" fill="#1F2933">• Chat, copilots, and agents</text>
  <text x="500" y="416" font-family="Arial, sans-serif" font-size="28" fill="#1F2933">• Enterprise automation</text>
  <text x="500" y="452" font-family="Arial, sans-serif" font-size="28" fill="#1F2933">• BIM, digital twins, simulation</text>
  <text x="500" y="488" font-family="Arial, sans-serif" font-size="28" fill="#1F2933">• End users and organisations</text>

  <!-- Dependency arrow -->
  <line x1="800" y1="540" x2="800" y2="508" stroke="#4B5563" stroke-width="4" marker-end="url(#arrow-grey)"/>

  <!-- Layer 4 -->
  <rect x="230" y="550" width="1140" height="220" rx="28" fill="#DCE6F6" stroke="#4B5563" stroke-width="4"/>
  <g fill="none" stroke="#1F2933" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
