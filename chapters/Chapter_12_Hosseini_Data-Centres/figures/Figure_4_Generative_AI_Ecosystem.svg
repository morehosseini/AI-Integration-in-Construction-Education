  <text x="500" y="1145" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#1F2933">2) Data Centre Facility and Building Systems</text>
  <text x="500" y="1190" font-family="Arial, sans-serif" font-size="28" fill="#1F2933">• UPS, switchgear, and redundancy</text>
  <text x="500" y="1226" font-family="Arial, sans-serif" font-size="28" fill="#1F2933">• Cooling plant: chillers and towers</text>
  <text x="500" y="1262" font-family="Arial, sans-serif" font-size="28" fill="#1F2933">• Backup generation and resilience</text>
  <text x="500" y="1298" font-family="Arial, sans-serif" font-size="28" fill="#1F2933">• Safety, security, and DCIM</text>

  <!-- Dependency arrow -->
  <line x1="800" y1="1350" x2="800" y2="1318" stroke="#4B5563" stroke-width="4" marker-end="url(#arrow-grey)"/>

  <!-- Layer 1 -->
  <rect x="230" y="1360" width="1140" height="220" rx="28" fill="#E88955" stroke="#4B5563" stroke-width="4"/>
